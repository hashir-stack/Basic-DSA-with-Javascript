<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reversing The Array And String</title>
</head>
<body>
    <script>
        let arr = [1,2,3,4,5,6];
        let revArr = [];
        for(let i = 0, j =arr.length-1; i< arr.length;i++,j--){
            revArr[i] = arr[j];
        }

        console.log(revArr);

        let str = "Hashir";
        let reverseStr = "";

        for(let i = str.length-1; i>=0;i--){
            reverseStr = reverseStr + str[i];
        }
        console.log(reverseStr);
    </script>
</body>
</html>
