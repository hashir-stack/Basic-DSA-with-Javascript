<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Sorting</title>
</head>
<body>
    <script>
        // let arr=[8,2,7,3,4,9,5];
        let arr = [66,2,77,4,22,2,76]

        for(let i = 0; i <=arr.length-1;i++){
            for(let j = 0 ; j <= arr.length-1;j++){
                if(arr[j] > arr[j+1]){
                    let temp = arr[j+1];
                    arr[j+1] = arr[j];
                    arr[j] = temp;
                }
            }
        }

        console.log(arr);
    </script>
</body>
</html>
